plugins {
	id 'org.springframework.boot' version '2.7.6'

	id 'io.spring.dependency-management' version '1.0.11.RELEASE'
    id 'com.google.cloud.tools.jib' version '3.3.0'
	id 'java'
}

group = 'org.kerminator'
version = '0.0.1-SNAPSHOT'

sourceCompatibility = '17'
targetCompatibility = '17'

configurations {
	developmentOnly
	runtimeClasspath {
		extendsFrom developmentOnly
	}
}

repositories {
	mavenCentral()
	maven { url 'https://repo.spring.io/milestone' }
}

jib {
	to {
		image = "public.ecr.aws/kerminator/spring-portti:latest"
		credHelper = "ecr-login"
	}
}

ext {
	set('springCloudVersion', "2021.0.5")

}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.cloud:spring-cloud-starter-gateway'
	implementation 'org.springframework.cloud:spring-cloud-starter-sleuth'
	implementation 'org.springframework.cloud:spring-cloud-starter-kubernetes-fabric8'
	implementation 'org.springframework.cloud:spring-cloud-kubernetes-fabric8-config'
	implementation "org.springframework.cloud:spring-cloud-starter-sleuth"
	testImplementation('org.springframework.boot:spring-boot-starter-test')
	runtimeOnly 'io.micrometer:micrometer-registry-prometheus'
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
	}
}

tasks.named("test") {
	useJUnitPlatform()
}
