server:
  shutdown: graceful
  
spring:
  main:
    cloud-platform: none
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          #url-expression: "'http://'+serviceId"


management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
---
spring:
  config:
    activate:
      on-profile: kubernetes
  cloud:
    kubernetes:
        reload:
          enabled: true
          mode: polling
          period: 5000
        discovery:
          service-labels:
            route: true
