apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: portti
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Team=test
spec:
  rules:
    - host: portti.kube.futucloud.com
      http:
        paths:
          - path: /
            backend: 
              serviceName: portti
              servicePort: 8080 