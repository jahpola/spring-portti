apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-portti
  labels:
    app: spring-portti
    tier: api-gw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-portti
  template:
    metadata:
      labels:
        app: spring-portti
    spec:
      containers:
      - name: portti
        image: kerminator/spring-portti
        resources:
          limits:
            cpu: 250m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        ports:
        - containerPort: 8080
