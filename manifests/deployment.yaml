apiVersion: v1 
kind: ServiceAccount
metadata:
  name: portti
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role 
metadata:
  name: portti
rules:
- apiGroups:
  - ""
  resources:
  - services
  - pods
  - configmaps
  - secrets
  - endpoints
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portti
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: portti
subjects:
- kind: ServiceAccount
  name: portti
---
apiVersion: v1
kind: Service
metadata:
  name: portti
  labels:
    app: portti
spec:
  selector:
    app: portti
  type: NodePort
  ports:
    - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portti
  labels:
    app: portti
    tier: api-gw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portti
  template:
    metadata:
      labels:
        app: portti
    spec:
      serviceAccountName: portti
      containers:
      - name: portti
        image: kerminator/spring-portti
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 8080
