apiVersion: apps/v1
kind: Deployment
metadata:
  name: portti
  labels:
    app: portti
    tier: api-gw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portti
  template:
    metadata:
      labels:
        app: portti
    spec:
      serviceAccountName: portti
      containers:
      - name: portti
        image: kerminator/spring-portti
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
   