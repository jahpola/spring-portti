apiVersion: apps/v1
kind: Deployment
metadata:
  name: portti
  labels:
    app: portti
    tier: api-gw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portti
  template:
    metadata:
      labels:
        app: portti
    spec:
      serviceAccountName: portti
      containers:
      - name: portti
        image: public.ecr.aws/kerminator/spring-portti:latest
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
   